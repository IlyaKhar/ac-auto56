<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prototype — Каталог</title>
    <style>
      :root { --bg:#efefef; --frame:#fff; --line:#a8a8a8; --dark:#7a7a7a; --light:#eaf2fb; --hero:#bbbbbb; --footer:#101010; }
      *{box-sizing:border-box}
      body{margin:0;background:var(--bg);font-family:Arial,sans-serif}
      .page{max-width:1220px;margin:0 auto;padding:10px 18px 30px}
      .devices{display:grid;grid-template-columns:1fr .72fr .42fr;gap:44px;align-items:start}
      .col{display:flex;flex-direction:column;align-items:center}
      .desktop-icon,.tablet-icon,.mobile-icon{position:relative;margin-bottom:12px}
      .desktop-icon{width:76px;height:54px;border:4px solid #666;border-radius:4px}
      .desktop-icon::before{content:"";position:absolute;left:50%;bottom:-13px;transform:translateX(-50%);width:22px;height:9px;background:#666;border-radius:2px}
      .desktop-icon::after{content:"";position:absolute;left:50%;bottom:-19px;transform:translateX(-50%);width:42px;height:4px;background:#666;border-radius:4px}
      .tablet-icon{width:54px;height:34px;border:4px solid #111;border-radius:5px}
      .tablet-icon::before{content:"";position:absolute;left:6px;top:50%;transform:translateY(-50%);width:5px;height:5px;background:#fff;border-radius:50%}
      .mobile-icon{width:26px;height:48px;border:4px solid #111;border-radius:6px}
      .mobile-icon::before{content:"";position:absolute;left:50%;bottom:3px;transform:translateX(-50%);width:6px;height:6px;background:#fff;border-radius:50%}
      .screen{width:100%;background:var(--frame)}
      .desktop{max-width:500px}.tablet{max-width:310px}.mobile{max-width:152px}
      .topbar{height:14px;background:#b6b6b6}.header{height:48px;background:#fff}.nav{height:18px;background:var(--dark)}
      .hero{height:140px;background:var(--hero)}
      .layout{display:grid;grid-template-columns:120px 1fr;gap:10px;padding:14px 10px 0}
      .filters{height:170px;background:#f2f2f2;border:1px solid #ddd}
      .right{min-width:0}
      .search{height:24px;background:#f7f7f7;border:1px solid #ddd;margin-bottom:8px}
      .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
      .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:4px}
      .grid1{display:grid;grid-template-columns:1fr;gap:6px}
      .card{background:#fff}
      .card-top{height:20px;background:var(--dark)}
      .card-body{height:70px;background:var(--light)}
      .pager{width:16px;height:16px;border:1px solid #999;background:#f5f5f5;margin:12px auto}
      .hero2{height:120px;background:#bcbcbc;margin-top:8px}
      .single{width:70px;height:70px;background:var(--light);margin:10px auto 14px}
      .cta{background:#d7d7d7;padding:8px;display:flex;justify-content:space-between;align-items:center}
      .t{width:70px;height:20px;background:#f4f4f4}.btn{width:44px;height:20px;background:#2f2f2f}
      .footer{height:18px;background:var(--footer)}
      .mobile .layout{grid-template-columns:1fr;padding:8px}
      .mobile .filters{height:64px}
      .mobile .hero{height:84px}
      .mobile .hero2{height:86px}
    </style>
  </head>
  <body>
    <div class="page">
      <div class="devices">
        <div class="col">
          <div class="desktop-icon"></div>
          <div class="screen desktop">
            <div class="topbar"></div><div class="header"></div><div class="nav"></div><div class="hero"></div>
            <div class="layout"><div class="filters"></div><div class="right"><div class="search"></div><div class="grid4"><div class="card"><div class="card-top"></div><div class="card-body"></div></div><div class="card"><div class="card-top"></div><div class="card-body"></div></div><div class="card"><div class="card-top"></div><div class="card-body"></div></div><div class="card"><div class="card-top"></div><div class="card-body"></div></div></div></div></div>
            <div class="pager"></div><div class="hero2"></div><div class="single"></div><div class="cta"><div class="t"></div><div class="btn"></div></div><div class="footer"></div>
          </div>
        </div>
        <div class="col">
          <div class="tablet-icon"></div>
          <div class="screen tablet">
            <div class="topbar"></div><div class="header"></div><div class="nav"></div><div class="hero"></div>
            <div class="layout" style="grid-template-columns:1fr"><div class="filters" style="height:74px"></div><div class="right"><div class="search"></div><div class="grid2"><div class="card"><div class="card-top"></div><div class="card-body"></div></div><div class="card"><div class="card-top"></div><div class="card-body"></div></div></div></div></div>
            <div class="hero2"></div><div class="single"></div><div class="cta"><div class="t"></div><div class="btn"></div></div><div class="footer"></div>
          </div>
        </div>
        <div class="col">
          <div class="mobile-icon"></div>
          <div class="screen mobile">
            <div class="topbar"></div><div class="header"></div><div class="nav"></div><div class="hero"></div>
            <div class="layout"><div class="filters"></div><div class="right"><div class="search"></div><div class="grid1"><div class="card"><div class="card-top"></div><div class="card-body"></div></div></div></div></div>
            <div class="hero2"></div><div class="single"></div><div class="cta"><div class="btn"></div></div><div class="footer"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
