<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prototype — Trade-In</title>
    <style>
      :root { --bg:#efefef; --frame:#fff; --line:#a8a8a8; --dark:#7a7a7a; --light:#eaf2fb; --hero:#b7b7b7; --footer:#101010; }
      *{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:Arial,sans-serif}
      .page{max-width:1220px;margin:0 auto;padding:10px 18px 30px}
      .devices{display:grid;grid-template-columns:1fr .72fr .42fr;gap:44px;align-items:start}
      .col{display:flex;flex-direction:column;align-items:center}
      .desktop-icon,.tablet-icon,.mobile-icon{position:relative;margin-bottom:12px}
      .desktop-icon{width:76px;height:54px;border:4px solid #666;border-radius:4px}
      .desktop-icon::before{content:"";position:absolute;left:50%;bottom:-13px;transform:translateX(-50%);width:22px;height:9px;background:#666;border-radius:2px}
      .desktop-icon::after{content:"";position:absolute;left:50%;bottom:-19px;transform:translateX(-50%);width:42px;height:4px;background:#666;border-radius:4px}
      .tablet-icon{width:54px;height:34px;border:4px solid #111;border-radius:5px}
      .tablet-icon::before{content:"";position:absolute;left:6px;top:50%;transform:translateY(-50%);width:5px;height:5px;background:#fff;border-radius:50%}
      .mobile-icon{width:26px;height:48px;border:4px solid #111;border-radius:6px}
      .mobile-icon::before{content:"";position:absolute;left:50%;bottom:3px;transform:translateX(-50%);width:6px;height:6px;background:#fff;border-radius:50%}
      .screen{width:100%;background:var(--frame)} .desktop{max-width:500px}.tablet{max-width:310px}.mobile{max-width:152px}
      .topbar{height:14px;background:#b6b6b6}.header{height:48px;background:#fff}.nav{height:18px;background:var(--dark)}
      .hero{height:190px;background:var(--hero)}
      .steps-title{width:130px;height:20px;background:var(--dark);margin:14px auto 8px}
      .steps{display:grid;grid-template-columns:1fr 30px 1fr 30px 1fr;gap:2px;padding:0 14px}
      .st{display:flex;flex-direction:column;align-items:center}.dot{width:22px;height:22px;border-radius:50%;background:#c41230;margin-bottom:8px}.tx{width:88%;height:34px;background:#ececec}
      .arr{display:grid;place-items:center;color:#b0b0b0}
      .form-dark{background:#111;margin-top:14px;padding:14px}
      .form-title{width:140px;height:18px;background:#d8d8d8;margin:0 auto 10px}
      .frow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
      .in{height:20px;background:#fff}
      .full{margin-top:8px;height:20px;background:#fff}
      .submit{margin-top:10px;height:22px;background:#c41230}
      .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:14px 10px 0}
      .card-top{height:18px;background:var(--dark)} .card-body{height:64px;background:var(--light)}
      .map{height:90px;background:#bcbcbc;margin:12px 10px 0}
      .cta{background:#d7d7d7;padding:8px 10px;display:flex;justify-content:space-between;align-items:center}
      .txt{width:90px;height:20px;background:#f4f4f4}.btn{width:44px;height:20px;background:#2f2f2f}
      .footer{height:18px;background:var(--footer)}
      .tablet .steps{grid-template-columns:1fr 20px 1fr 20px 1fr;padding:0 8px}
      .tablet .cards{grid-template-columns:repeat(2,1fr)}
      .mobile .hero{height:120px}
      .mobile .steps{grid-template-columns:1fr;padding:0 8px;gap:8px}
      .mobile .arr{display:none}
      .mobile .frow{grid-template-columns:1fr}
      .mobile .cards{grid-template-columns:1fr}
    </style>
  </head>
  <body>
    <div class="page">
      <div class="devices">
        <div class="col"><div class="desktop-icon"></div><div class="screen desktop"><div class="topbar"></div><div class="header"></div><div class="nav"></div><div class="hero"></div><div class="steps-title"></div><div class="steps"><div class="st"><div class="dot"></div><div class="tx"></div></div><div class="arr">›</div><div class="st"><div class="dot"></div><div class="tx"></div></div><div class="arr">›</div><div class="st"><div class="dot"></div><div class="tx"></div></div></div><div class="form-dark"><div class="form-title"></div><div class="frow"><div class="in"></div><div class="in"></div></div><div class="full"></div><div class="full"></div><div class="submit"></div></div><div class="cards"><div><div class="card-top"></div><div class="card-body"></div></div><div><div class="card-top"></div><div class="card-body"></div></div><div><div class="card-top"></div><div class="card-body"></div></div><div><div class="card-top"></div><div class="card-body"></div></div></div><div class="map"></div><div class="cta"><div class="txt"></div><div class="btn"></div></div><div class="footer"></div></div></div>
        <div class="col"><div class="tablet-icon"></div><div class="screen tablet"><div class="topbar"></div><div class="header"></div><div class="nav"></div><div class="hero"></div><div class="steps-title"></div><div class="steps"><div class="st"><div class="dot"></div><div class="tx"></div></div><div class="arr">›</div><div class="st"><div class="dot"></div><div class="tx"></div></div><div class="arr">›</div><div class="st"><div class="dot"></div><div class="tx"></div></div></div><div class="form-dark"><div class="form-title"></div><div class="frow"><div class="in"></div><div class="in"></div></div><div class="full"></div><div class="submit"></div></div><div class="cards"><div><div class="card-top"></div><div class="card-body"></div></div><div><div class="card-top"></div><div class="card-body"></div></div></div><div class="map"></div><div class="cta"><div class="txt"></div><div class="btn"></div></div><div class="footer"></div></div></div>
        <div class="col"><div class="mobile-icon"></div><div class="screen mobile"><div class="topbar"></div><div class="header"></div><div class="nav"></div><div class="hero"></div><div class="steps-title"></div><div class="steps"><div class="st"><div class="dot"></div><div class="tx"></div></div><div class="st"><div class="dot"></div><div class="tx"></div></div></div><div class="form-dark"><div class="form-title"></div><div class="frow"><div class="in"></div><div class="in"></div></div><div class="submit"></div></div><div class="cards"><div><div class="card-top"></div><div class="card-body"></div></div></div><div class="map"></div><div class="cta"><div class="btn"></div></div><div class="footer"></div></div></div>
      </div>
    </div>
  </body>
</html>
