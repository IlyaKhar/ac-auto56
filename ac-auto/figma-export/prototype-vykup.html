<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prototype — Выкуп</title>
    <style>
      :root { --bg:#efefef; --frame:#fff; --dark:#7a7a7a; --light:#eaf2fb; --hero:#b7b7b7; --footer:#101010; }
      *{box-sizing:border-box} body{margin:0;background:var(--bg);font-family:Arial,sans-serif}
      .page{max-width:1220px;margin:0 auto;padding:10px 18px 30px}
      .devices{display:grid;grid-template-columns:1fr .72fr .42fr;gap:44px;align-items:start}
      .col{display:flex;flex-direction:column;align-items:center}
      .desktop-icon,.tablet-icon,.mobile-icon{position:relative;margin-bottom:12px}
      .desktop-icon{width:76px;height:54px;border:4px solid #666;border-radius:4px}
      .desktop-icon::before{content:"";position:absolute;left:50%;bottom:-13px;transform:translateX(-50%);width:22px;height:9px;background:#666;border-radius:2px}
      .desktop-icon::after{content:"";position:absolute;left:50%;bottom:-19px;transform:translateX(-50%);width:42px;height:4px;background:#666;border-radius:4px}
      .tablet-icon{width:54px;height:34px;border:4px solid #111;border-radius:5px}
      .tablet-icon::before{content:"";position:absolute;left:6px;top:50%;transform:translateY(-50%);width:5px;height:5px;background:#fff;border-radius:50%}
      .mobile-icon{width:26px;height:48px;border:4px solid #111;border-radius:6px}
      .mobile-icon::before{content:"";position:absolute;left:50%;bottom:3px;transform:translateX(-50%);width:6px;height:6px;background:#fff;border-radius:50%}
      .screen{width:100%;background:var(--frame)} .desktop{max-width:500px}.tablet{max-width:310px}.mobile{max-width:152px}
      .topbar{height:14px;background:#b6b6b6}.header{height:48px;background:#fff}.nav{height:18px;background:var(--dark)}
      .hero{height:190px;background:var(--hero)}
      .title{width:150px;height:20px;background:var(--dark);margin:16px auto 10px}
      .benefits{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px}
      .b{display:flex;gap:8px;align-items:flex-start}.dot{width:18px;height:18px;border-radius:50%;background:#c41230;flex:0 0 auto}.tx{height:28px;background:#ececec;flex:1}
      .timeline{padding:14px 12px 0}
      .line{height:2px;background:#c41230;margin:12px 6px}
      .steps{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
      .step{display:flex;flex-direction:column;align-items:flex-start}.n{width:20px;height:20px;border-radius:50%;background:#c41230;margin-bottom:6px}
      .stx{height:30px;background:#ececec;width:100%}
      .form-dark{background:#111;margin-top:16px;padding:14px}
      .ft{width:160px;height:18px;background:#d8d8d8;margin:0 auto 10px}
      .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
      .in{height:20px;background:#fff}.full{margin-top:8px;height:20px;background:#fff}.submit{margin-top:10px;height:22px;background:#c41230}
      .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:14px 10px 0}
      .card-top{height:18px;background:var(--dark)} .card-body{height:64px;background:var(--light)}
      .map{height:90px;background:#bcbcbc;margin:12px 10px 0}
      .cta{background:#d7d7d7;padding:8px 10px;display:flex;justify-content:space-between;align-items:center}
      .txt{width:90px;height:20px;background:#f4f4f4}.btn{width:44px;height:20px;background:#2f2f2f}
      .footer{height:18px;background:var(--footer)}
      .tablet .cards{grid-template-columns:repeat(2,1fr)}
      .mobile .hero{height:120px}
      .mobile .benefits,.mobile .steps,.mobile .cards{grid-template-columns:1fr}
      .mobile .row2{grid-template-columns:1fr}
    </style>
  </head>
  <body>
    <div class="page">
      <div class="devices">
        <div class="col"><div class="desktop-icon"></div><div class="screen desktop"><div class="topbar"></div><div class="header"></div><div class="nav"></div><div class="hero"></div><div class="title"></div><div class="benefits"><div class="b"><div class="dot"></div><div class="tx"></div></div><div class="b"><div class="dot"></div><div class="tx"></div></div><div class="b"><div class="dot"></div><div class="tx"></div></div><div class="b"><div class="dot"></div><div class="tx"></div></div><div class="b"><div class="dot"></div><div class="tx"></div></div><div class="b"><div class="dot"></div><div class="tx"></div></div></div><div class="timeline"><div class="line"></div><div class="steps"><div class="step"><div class="n"></div><div class="stx"></div></div><div class="step"><div class="n"></div><div class="stx"></div></div><div class="step"><div class="n"></div><div class="stx"></div></div><div class="step"><div class="n"></div><div class="stx"></div></div></div></div><div class="form-dark"><div class="ft"></div><div class="row2"><div class="in"></div><div class="in"></div></div><div class="full"></div><div class="full"></div><div class="submit"></div></div><div class="cards"><div><div class="card-top"></div><div class="card-body"></div></div><div><div class="card-top"></div><div class="card-body"></div></div><div><div class="card-top"></div><div class="card-body"></div></div><div><div class="card-top"></div><div class="card-body"></div></div></div><div class="map"></div><div class="cta"><div class="txt"></div><div class="btn"></div></div><div class="footer"></div></div></div>
        <div class="col"><div class="tablet-icon"></div><div class="screen tablet"><div class="topbar"></div><div class="header"></div><div class="nav"></div><div class="hero"></div><div class="title"></div><div class="benefits"><div class="b"><div class="dot"></div><div class="tx"></div></div><div class="b"><div class="dot"></div><div class="tx"></div></div><div class="b"><div class="dot"></div><div class="tx"></div></div><div class="b"><div class="dot"></div><div class="tx"></div></div></div><div class="timeline"><div class="line"></div><div class="steps"><div class="step"><div class="n"></div><div class="stx"></div></div><div class="step"><div class="n"></div><div class="stx"></div></div><div class="step"><div class="n"></div><div class="stx"></div></div><div class="step"><div class="n"></div><div class="stx"></div></div></div></div><div class="form-dark"><div class="ft"></div><div class="row2"><div class="in"></div><div class="in"></div></div><div class="submit"></div></div><div class="cards"><div><div class="card-top"></div><div class="card-body"></div></div><div><div class="card-top"></div><div class="card-body"></div></div></div><div class="map"></div><div class="cta"><div class="txt"></div><div class="btn"></div></div><div class="footer"></div></div></div>
        <div class="col"><div class="mobile-icon"></div><div class="screen mobile"><div class="topbar"></div><div class="header"></div><div class="nav"></div><div class="hero"></div><div class="title"></div><div class="benefits"><div class="b"><div class="dot"></div><div class="tx"></div></div><div class="b"><div class="dot"></div><div class="tx"></div></div></div><div class="timeline"><div class="steps"><div class="step"><div class="n"></div><div class="stx"></div></div><div class="step"><div class="n"></div><div class="stx"></div></div></div></div><div class="form-dark"><div class="ft"></div><div class="row2"><div class="in"></div><div class="in"></div></div><div class="submit"></div></div><div class="cards"><div><div class="card-top"></div><div class="card-body"></div></div></div><div class="map"></div><div class="cta"><div class="btn"></div></div><div class="footer"></div></div></div>
      </div>
    </div>
  </body>
</html>
