<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prototype — Главная</title>
    <style>
      :root {
        --bg: #efefef;
        --frame: #ffffff;
        --line: #a8a8a8;
        --dark: #7a7a7a;
        --light: #eaf2fb;
        --hero: #c7c7c7;
        --footer: #101010;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: #333; }
      .page { max-width: 1220px; margin: 0 auto; padding: 10px 18px 30px; }
      .devices { display: grid; grid-template-columns: 1fr 0.72fr 0.42fr; gap: 44px; align-items: start; }
      .device-col { display: flex; flex-direction: column; align-items: center; }
      .device-icon { color: #111; margin-bottom: 12px; }
      .desktop-icon { width: 76px; height: 54px; border: 4px solid #666; border-radius: 4px; position: relative; }
      .desktop-icon::before { content: ""; position: absolute; left: 50%; bottom: -13px; width: 22px; height: 9px; transform: translateX(-50%); background: #666; border-radius: 2px; }
      .desktop-icon::after { content: ""; position: absolute; left: 50%; bottom: -19px; width: 42px; height: 4px; transform: translateX(-50%); background: #666; border-radius: 4px; }
      .tablet-icon { width: 54px; height: 34px; border: 4px solid #111; border-radius: 5px; position: relative; }
      .tablet-icon::before { content: ""; position: absolute; left: 6px; top: 50%; transform: translateY(-50%); width: 5px; height: 5px; background: #fff; border-radius: 50%; }
      .mobile-icon { width: 26px; height: 48px; border: 4px solid #111; border-radius: 6px; position: relative; }
      .mobile-icon::before { content: ""; position: absolute; left: 50%; bottom: 3px; transform: translateX(-50%); width: 6px; height: 6px; background: #fff; border-radius: 50%; }
      .screen { background: var(--frame); width: 100%; box-shadow: 0 0 0 1px rgba(0,0,0,.04); }
      .screen.desktop { max-width: 500px; }
      .screen.tablet { max-width: 310px; }
      .screen.mobile { max-width: 152px; }
      .topbar { height: 14px; background: #b6b6b6; position: relative; }
      .topbar::after { content: "○ ○ ○ ○"; position: absolute; right: 8px; top: -1px; font-size: 8px; color: #f7f7f7; letter-spacing: 2px; }
      .header { height: 48px; background: #fff; display: flex; justify-content: center; align-items: center; }
      .logo { width: 72px; height: 26px; border: 1px solid #d2d2d2; background: #fafafa; }
      .nav { height: 18px; background: var(--dark); }
      .cards3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 22px 14px 0; }
      .cards2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px; padding: 18px 10px 0; }
      .cards1 { display: grid; grid-template-columns: 1fr; gap: 8px; padding: 14px 8px 0; }
      .card { background: #fff; }
      .card-top { height: 26px; background: var(--dark); }
      .card-body { height: 90px; background: var(--light); }
      .hero { margin-top: 18px; height: 180px; background: var(--hero); position: relative; overflow: hidden; }
      .hero::before, .hero::after { content: ""; position: absolute; inset: 0; border-top: 1px solid #9a9a9a; }
      .hero::before { transform: skewY(16deg); transform-origin: left top; }
      .hero::after { transform: skewY(-16deg); transform-origin: right top; }
      .section-title { width: 108px; height: 24px; background: var(--dark); margin: 18px auto 8px; }
      .single-card { width: 110px; height: 95px; background: var(--light); margin: 0 auto 22px; }
      .cta-band { background: #d7d7d7; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
      .cta-text { width: 120px; height: 28px; background: #f4f4f4; }
      .cta-form { display: flex; gap: 8px; align-items: center; }
      .input { width: 110px; height: 24px; background: #fff; border: 1px solid #cfcfcf; }
      .button { width: 54px; height: 24px; background: #2f2f2f; }
      .footer { height: 18px; background: var(--footer); position: relative; }
      .footer::after { content: "○ ○ ○"; position: absolute; right: 10px; top: 3px; color: #fff; font-size: 8px; letter-spacing: 3px; }
      .mobile .hero { height: 120px; }
      .mobile .section-title { width: 78px; height: 18px; }
      .mobile .single-card { width: 82px; height: 82px; }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="devices">
        <div class="device-col">
          <div class="device-icon desktop-icon"></div>
          <div class="screen desktop">
            <div class="topbar"></div>
            <div class="header"><div class="logo"></div></div>
            <div class="nav"></div>
            <div class="cards3">
              <div class="card"><div class="card-top"></div><div class="card-body"></div></div>
              <div class="card"><div class="card-top"></div><div class="card-body"></div></div>
              <div class="card"><div class="card-top"></div><div class="card-body"></div></div>
            </div>
            <div class="hero"></div>
            <div class="section-title"></div>
            <div class="single-card"></div>
            <div class="cta-band"><div class="cta-text"></div><div class="cta-form"><div class="input"></div><div class="button"></div></div></div>
            <div class="footer"></div>
          </div>
        </div>

        <div class="device-col">
          <div class="device-icon tablet-icon"></div>
          <div class="screen tablet">
            <div class="topbar"></div>
            <div class="header"><div class="logo"></div></div>
            <div class="nav"></div>
            <div class="cards2">
              <div class="card"><div class="card-top"></div><div class="card-body"></div></div>
              <div class="card"><div class="card-top"></div><div class="card-body"></div></div>
            </div>
            <div class="hero"></div>
            <div class="section-title"></div>
            <div class="single-card"></div>
            <div class="cta-band"><div class="cta-text"></div><div class="button"></div></div>
            <div class="footer"></div>
          </div>
        </div>

        <div class="device-col">
          <div class="device-icon mobile-icon"></div>
          <div class="screen mobile">
            <div class="topbar"></div>
            <div class="header"><div class="logo" style="width:58px;height:22px;"></div></div>
            <div class="nav"></div>
            <div class="cards1">
              <div class="card"><div class="card-top"></div><div class="card-body"></div></div>
            </div>
            <div class="hero"></div>
            <div class="section-title"></div>
            <div class="single-card"></div>
            <div class="cta-band" style="padding:8px;"><div class="cta-text" style="width:70px;height:20px;"></div></div>
            <div class="footer"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
