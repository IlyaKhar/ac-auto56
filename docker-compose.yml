# Явное имя: из кириллического пути папки Compose иногда не может вывести project name → "must not be empty"
name: acauto

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: acauto
      POSTGRES_PASSWORD: acauto
      POSTGRES_DB: acauto
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acauto -d acauto"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://acauto:acauto@postgres:5432/acauto?sslmode=disable
      HTTP_PORT: "8080"
      MIGRATIONS_PATH: /migrations
      CORS_ALLOW_ORIGIN: http://localhost:5173
      JWT_SECRET: dev-jwt-secret-min-16chars!!
      TURNSTILE_SKIP: "true"
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - api

  # Одноразовый контейнер: создать админа (ADMIN_EMAIL / ADMIN_PASSWORD обязательны или из .env)
  seed:
    build:
      context: .
      dockerfile: server/Dockerfile.seed
    environment:
      DATABASE_URL: postgres://acauto:acauto@postgres:5432/acauto?sslmode=disable
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@local.test}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      MODERATOR_EMAIL: ${MODERATOR_EMAIL:-}
      MODERATOR_PASSWORD: ${MODERATOR_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - seed

volumes:
  pgdata:
